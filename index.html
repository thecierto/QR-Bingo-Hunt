<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Cierto: Toolbox Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fafaf8; min-height: 100vh; }

    /* Header */
    .header { background: #1a1a1a; color: #f5f0e8; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 50; }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { background: none; border: none; color: #a8a090; cursor: pointer; padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .nav-tab.active { background: #f5f0e8; color: #1a1a1a; }
    .nav-tab:hover:not(.active) { color: #f5f0e8; background: rgba(255,255,255,0.08); }

    /* Layout */
    .page { max-width: 1140px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
    .page-sub { color: #888; font-size: 14px; font-weight: 300; margin-bottom: 28px; }

    /* Search & filter */
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .search-input { flex: 1; min-width: 220px; padding: 9px 14px; border: 1.5px solid #e0ddd6; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #fff; outline: none; transition: border 0.15s; }
    .search-input:focus { border-color: #1a1a1a; }
    .cat-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-chip { border: 1.5px solid #e0ddd6; background: #fff; border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: #555; transition: all 0.15s; }
    .cat-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .cat-chip:hover:not(.active) { border-color: #999; color: #222; }

    /* Cards grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
    .card { border-radius: 14px; border: 1.5px solid #e8e4dc; background: #fff; overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.09); transform: translateY(-2px); }
    .card-top { padding: 20px 20px 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: #1a1a1a; line-height: 1.25; }
    .card-cat { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
    .card-desc { font-size: 13.5px; color: #666; line-height: 1.55; font-weight: 300; }
    .card-footer { padding: 14px 20px; border-top: 1px solid #f0ede7; background: #fdfcfb; }
    .cred-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12.5px; color: #555; }
    .cred-label { color: #aaa; font-weight: 500; min-width: 54px; }
    .cred-val { font-family: monospace; font-size: 12px; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .cred-val.hidden { letter-spacing: 3px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #aaa; padding: 2px 4px; border-radius: 4px; display: flex; align-items: center; transition: color 0.15s; flex-shrink: 0; }
    .icon-btn:hover { color: #333; }
    .lock-note { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; color: #888; font-size: 12px; }
    .no-auth-note { font-size: 12px; color: #aaa; font-style: italic; }
    .visit-btn { display: block; text-align: center; color: #fff; text-decoration: none; border-radius: 8px; padding: 9px 0; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; margin-top: 12px; transition: opacity 0.15s; cursor: pointer; border: none; width: 100%; }
    .visit-btn:hover { opacity: 0.88; }
    .no-results { text-align: center; padding: 60px 20px; color: #bbb; font-style: italic; }
    .copied-check { font-size: 11px; color: #22863a; }

    /* Admin bar */
    .admin-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .admin-bar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .save-badge { font-size: 12px; color: #22863a; font-weight: 500; }

    /* Buttons */
    .btn-primary { background: #1a1a1a; color: #f5f0e8; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { background: #fff; color: #c0392b; border: 1.5px solid #e8b4b0; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .btn-danger:hover { background: #fff5f5; }
    .btn-outline { background: #fff; color: #1a1a1a; border: 1.5px solid #e0ddd6; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .btn-outline:hover { border-color: #1a1a1a; }

    /* Admin list */
    .admin-list { display: flex; flex-direction: column; gap: 14px; }
    .admin-card { border: 1.5px solid #e8e4dc; border-radius: 12px; background: #fff; overflow: hidden; }
    .admin-card-header { padding: 16px 20px; background: #fafaf8; border-bottom: 1px solid #f0ede7; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .admin-card-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; }
    .admin-card-cat { font-size: 12px; color: #aaa; margin-top: 2px; }
    .admin-card-body { padding: 14px 20px; font-size: 13.5px; color: #666; }
    .admin-card-url { margin-top: 6px; font-size: 12.5px; color: #888; }
    .admin-card-creds { margin-top: 8px; font-size: 12.5px; color: #888; }
    .admin-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Login */
    .login-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-box { background: #fff; border: 1.5px solid #e8e4dc; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; text-align: center; }
    .login-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
    .login-sub { font-size: 13px; color: #aaa; margin-bottom: 28px; }
    .login-error { background: #fff5f5; color: #c0392b; border-radius: 8px; padding: 9px 14px; font-size: 13px; margin-bottom: 16px; }

    /* Modal overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.18); }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; }
    .modal-sm { max-width: 380px; text-align: center; }
    .modal-sm p { color: #888; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 9px 13px; border: 1.5px solid #e0ddd6; border-radius: 8px;
      font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
      background: #fafaf8; transition: border 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #1a1a1a; background: #fff; }
    .form-textarea { min-height: 72px; resize: vertical; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #333; }
    .checkbox-row input { width: 15px; height: 15px; cursor: pointer; }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .color-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: transform 0.15s; }
    .color-swatch.selected { transform: scale(1.2); }
    .delete-actions { display: flex; gap: 10px; justify-content: center; }
    .hidden-section { display: none; }

    @media (max-width: 600px) {
      .header { padding: 0 16px; }
      .page { padding: 20px 14px; }
      .modal { padding: 24px 18px; }
      .admin-card-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">The Cierto</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-public" onclick="showView('public')">Directory</button>
    <button class="nav-tab" id="tab-admin" onclick="showView('login-or-admin')">Admin</button>
  </div>
</div>

<!-- PUBLIC VIEW -->
<div id="view-public" class="page">
  <div class="page-title">Toolbox Directory</div>
  <div class="page-sub" id="app-count"></div>
  <div class="search-bar">
    <input class="search-input" id="search-input" placeholder="Search apps…" oninput="renderPublic()" />
    <div class="cat-chips" id="cat-chips"></div>
  </div>
  <div id="no-results" class="no-results hidden-section">No apps match your search.</div>
  <div class="grid" id="public-grid"></div>
</div>

<!-- LOGIN VIEW -->
<div id="view-login" class="login-wrap" style="display:none;">
  <div class="login-box">
    <div class="login-title">Admin Access</div>
    <div class="login-sub">Enter the admin password to manage your directory.</div>
    <div id="login-error" class="login-error" style="display:none;"></div>
    <input class="form-input" id="login-pw-input" type="password" placeholder="Password"
      onkeydown="if(event.key==='Enter') doLogin()" style="margin-bottom:14px;" />
    <button class="btn-primary" style="width:100%;" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ADMIN VIEW -->
<div id="view-admin" class="page" style="display:none;">
  <div class="admin-bar">
    <div>
      <div class="page-title">Admin Dashboard</div>
      <div class="page-sub">Manage your app directory entries</div>
    </div>
    <div class="admin-bar-actions">
      <span class="save-badge" id="save-badge" style="display:none;">Saved ✓</span>
      <button class="btn-outline" onclick="showView('public')">← View Directory</button>
      <button class="btn-primary" onclick="openAddModal()">+ Add App</button>
    </div>
  </div>
  <!-- Subtitle editor -->
  <div style="background:#fff;border:1.5px solid #e8e4dc;border-radius:12px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <label style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;color:#888;white-space:nowrap;">Directory Subtitle</label>
    <input class="form-input" id="subtitle-input" style="flex:1;min-width:200px;" placeholder="e.g. 3 apps available to your team" oninput="subtitleChanged()" />
    <button class="btn-primary" id="subtitle-save-btn" onclick="saveSubtitle()" disabled>Save</button>
    <button class="btn-outline" onclick="resetSubtitle()">Reset to Default</button>
  </div>
  <div class="admin-list" id="admin-list"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="form-modal" style="display:none;" onclick="if(event.target===this) closeFormModal()">
  <div class="modal">
    <div class="modal-title" id="form-modal-title">Add New App</div>
    <input type="hidden" id="f-id" />
    <div class="form-group">
      <label class="form-label">App Name *</label>
      <input class="form-input" id="f-name" placeholder="e.g. Project Tracker" oninput="checkFormValid()" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What does this app do?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" id="f-url" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-category"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Card Color</label>
      <div class="color-picker" id="f-colors"></div>
    </div>
    <div class="form-group">
      <label class="checkbox-row">
        <input type="checkbox" id="f-requires-auth" onchange="toggleCredFields()" />
        Requires login credentials
      </label>
    </div>
    <div id="cred-fields" style="display:none;">
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input class="form-input" id="f-username" placeholder="username or email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="f-password" placeholder="password" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeFormModal()">Cancel</button>
      <button class="btn-primary" id="form-save-btn" onclick="saveForm()" disabled>Save</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="overlay" id="delete-modal" style="display:none;" onclick="if(event.target===this) closeDeleteModal()">
  <div class="modal modal-sm">
    <div class="modal-title">Delete App?</div>
    <p>This will permanently remove <strong id="delete-app-name"></strong> from the directory.</p>
    <div class="delete-actions">
      <button class="btn-outline" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<script>
  // ─── Config ──────────────────────────────────────────────────────────
  const ADMIN_PASSWORD = "admin123"; // Change this to your desired password

  const CATEGORIES = ["Productivity","Analytics","Knowledge","Communication","Finance","HR","Dev Tools","Other"];

  const COLORS = [
    { bg:"#e8f4fd", accent:"#2d7dd2" },
    { bg:"#fdf6ec", accent:"#e07b39" },
    { bg:"#f0fdf4", accent:"#22863a" },
    { bg:"#fdf4ff", accent:"#8b5cf6" },
    { bg:"#fff1f2", accent:"#e11d48" },
    { bg:"#f0f9ff", accent:"#0284c7" },
    { bg:"#fefce8", accent:"#ca8a04" },
    { bg:"#f7f7f7", accent:"#374151" },
  ];

  const DEFAULT_APPS = [
    { id:"1", name:"Project Tracker", description:"Track tasks, milestones, and team progress across all active projects.", url:"https://example.com/tracker", category:"Productivity", requiresAuth:true, username:"team@company.com", password:"tracker2024", color:"#e8f4fd", accent:"#2d7dd2" },
    { id:"2", name:"Analytics Hub", description:"Real-time dashboards and reporting for business intelligence.", url:"https://example.com/analytics", category:"Analytics", requiresAuth:true, username:"analyst", password:"hub!secure", color:"#fdf6ec", accent:"#e07b39" },
    { id:"3", name:"Company Wiki", description:"Internal knowledge base, onboarding docs, and process guides.", url:"https://example.com/wiki", category:"Knowledge", requiresAuth:false, username:"", password:"", color:"#f0fdf4", accent:"#22863a" },
  ];

  // ─── State ─────────────────────────────────────────────────────────
  let apps = [];
  let currentView = "public";
  let isAdminAuthed = false;
  let filterCat = "All";
  let editingId = null;
  let deletingId = null;
  let selectedColor = COLORS[0];
  let showPasswords = {};
  let copied = {};

  // ─── Storage ───────────────────────────────────────────────────────
  function loadApps() {
    try {
      const stored = localStorage.getItem("appdirectory-apps");
      apps = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULT_APPS));
    } catch { apps = JSON.parse(JSON.stringify(DEFAULT_APPS)); }
  }

  function saveApps() {
    try {
      localStorage.setItem("appdirectory-apps", JSON.stringify(apps));
      showSaveBadge();
    } catch {}
  }

  function showSaveBadge() {
    const b = document.getElementById("save-badge");
    b.style.display = "inline";
    clearTimeout(b._t);
    b._t = setTimeout(() => b.style.display = "none", 2000);
  }

  // ─── View routing ──────────────────────────────────────────────────
  function showView(name) {
    if (name === "login-or-admin") name = isAdminAuthed ? "admin" : "login";
    currentView = name;
    ["public","login","admin"].forEach(v => {
      document.getElementById("view-" + v).style.display = (v === name) ? "" : "none";
    });
    document.getElementById("tab-public").classList.toggle("active", name === "public");
    document.getElementById("tab-admin").classList.toggle("active", name === "admin" || name === "login");
    if (name === "public") renderPublic();
    if (name === "admin") renderAdmin();
    if (name === "login") {
      document.getElementById("login-pw-input").value = "";
      document.getElementById("login-error").style.display = "none";
    }
  }

  // ─── Login ─────────────────────────────────────────────────────────
  function doLogin() {
    const pw = document.getElementById("login-pw-input").value;
    const err = document.getElementById("login-error");
    if (pw === ADMIN_PASSWORD) {
      isAdminAuthed = true;
      err.style.display = "none";
      showView("admin");
    } else {
      err.textContent = "Incorrect password.";
      err.style.display = "block";
    }
  }

  // ─── Render Public ─────────────────────────────────────────────────
  function getFilteredApps() {
    const s = document.getElementById("search-input").value.toLowerCase();
    return apps.filter(a => {
      const matchSearch = !s || a.name.toLowerCase().includes(s) || a.description.toLowerCase().includes(s) || a.category.toLowerCase().includes(s);
      const matchCat = filterCat === "All" || a.category === filterCat;
      return matchSearch && matchCat;
    });
  }

  function renderCatChips() {
    const cats = ["All", ...new Set(apps.map(a => a.category))];
    const container = document.getElementById("cat-chips");
    container.innerHTML = cats.map(c =>
      `<button class="cat-chip${c === filterCat ? " active" : ""}" onclick="setCat('${c}')">${c}</button>`
    ).join("");
  }

  function setCat(cat) {
    filterCat = cat;
    renderPublic();
  }

  function defaultSubtitle() {
    return apps.length + " app" + (apps.length !== 1 ? "s" : "") + " available to your team";
  }

  function renderPublic() {
    const custom = localStorage.getItem("appdirectory-subtitle");
    document.getElementById("app-count").textContent = custom !== null ? custom : defaultSubtitle();
    renderCatChips();
    const filtered = getFilteredApps();
    const grid = document.getElementById("public-grid");
    const noResults = document.getElementById("no-results");
    noResults.style.display = filtered.length === 0 ? "" : "none";
    grid.innerHTML = filtered.map(app => buildPublicCard(app)).join("");
  }

  function buildPublicCard(app) {
    const bg = app.color + "88";
    const credSection = app.requiresAuth ? `
      <div class="lock-note">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Login required
      </div>
      <div class="cred-row">
        <span class="cred-label">Username</span>
        <span class="cred-val">${esc(app.username)}</span>
        <button class="icon-btn" title="Copy username" onclick="copyText('${app.id}','u',${JSON.stringify(app.username)})">
          ${copied[app.id+"-u"] ? '<span class="copied-check">✓</span>' : copyIcon()}
        </button>
      </div>
      <div class="cred-row">
        <span class="cred-val ${showPasswords[app.id] ? "" : "hidden"}" id="pw-val-${app.id}">
          ${showPasswords[app.id] ? esc(app.password) : "••••••••"}
        </span>
        <span class="cred-label" style="order:-1">Password</span>
        <button class="icon-btn" title="Toggle password" onclick="togglePass('${app.id}')">
          ${eyeIcon(showPasswords[app.id])}
        </button>
        <button class="icon-btn" title="Copy password" onclick="copyText('${app.id}','p',${JSON.stringify(app.password)})">
          ${copied[app.id+"-p"] ? '<span class="copied-check">✓</span>' : copyIcon()}
        </button>
      </div>
    ` : `<div class="no-auth-note">No login required</div>`;

    const visitBtn = app.url ? `<button class="visit-btn" style="background:${app.accent}" onclick="window.open('${esc(app.url)}','_blank')">Open App →</button>` : "";

    return `
      <div class="card">
        <div class="card-top" style="background:${bg}">
          <div class="card-header">
            <div class="card-name">${esc(app.name)}</div>
            <span class="card-cat" style="background:${app.color};color:${app.accent}">${esc(app.category)}</span>
          </div>
          <div class="card-desc">${esc(app.description)}</div>
        </div>
        <div class="card-footer">
          ${credSection}
          ${visitBtn}
        </div>
      </div>`;
  }

  function togglePass(id) {
    showPasswords[id] = !showPasswords[id];
    renderPublic();
  }

  function copyText(id, field, text) {
    navigator.clipboard.writeText(text).then(() => {
      copied[id+"-"+field] = true;
      renderPublic();
      setTimeout(() => { copied[id+"-"+field] = false; renderPublic(); }, 1500);
    });
  }

  // ─── Subtitle ──────────────────────────────────────────────────────
  function subtitleChanged() {
    document.getElementById("subtitle-save-btn").disabled = false;
  }

  function saveSubtitle() {
    const val = document.getElementById("subtitle-input").value;
    localStorage.setItem("appdirectory-subtitle", val);
    document.getElementById("subtitle-save-btn").disabled = true;
    showSaveBadge();
  }

  function resetSubtitle() {
    localStorage.removeItem("appdirectory-subtitle");
    document.getElementById("subtitle-input").value = "";
    document.getElementById("subtitle-save-btn").disabled = true;
    showSaveBadge();
  }

  // ─── Render Admin ──────────────────────────────────────────────────
  function renderAdmin() {
    const custom = localStorage.getItem("appdirectory-subtitle");
    const input = document.getElementById("subtitle-input");
    input.value = custom !== null ? custom : "";
    input.placeholder = defaultSubtitle();
    document.getElementById("subtitle-save-btn").disabled = true;
    const list = document.getElementById("admin-list");
    if (apps.length === 0) { list.innerHTML = '<div class="no-results">No apps yet. Click "+ Add App" to get started.</div>'; return; }
    list.innerHTML = apps.map(app => `
      <div class="admin-card">
        <div class="admin-card-header" style="border-left:4px solid ${app.accent}">
          <div>
            <div class="admin-card-name">${esc(app.name)}</div>
            <div class="admin-card-cat">${esc(app.category)}</div>
          </div>
          <div class="admin-actions">
            <button class="btn-outline" onclick="openEditModal('${app.id}')">Edit</button>
            <button class="btn-danger" onclick="openDeleteModal('${app.id}')">Delete</button>
          </div>
        </div>
        <div class="admin-card-body">
          <div>${esc(app.description)}</div>
          ${app.url ? `<div class="admin-card-url">🔗 ${esc(app.url)}</div>` : ""}
          ${app.requiresAuth ? `<div class="admin-card-creds">🔐 <strong style="color:#555">${esc(app.username)}</strong> / ${esc(app.password)}</div>` : ""}
        </div>
      </div>`).join("");
  }

  // ─── Form Modal ────────────────────────────────────────────────────
  function buildFormSelects() {
    // Categories
    const sel = document.getElementById("f-category");
    sel.innerHTML = CATEGORIES.map(c => `<option>${c}</option>`).join("");
    // Colors
    const cp = document.getElementById("f-colors");
    cp.innerHTML = COLORS.map((c, i) => `
      <div class="color-swatch" id="swatch-${i}" style="background:${c.bg}"
        onclick="selectColor(${i})"></div>`).join("");
  }

  function selectColor(i) {
    selectedColor = COLORS[i];
    document.querySelectorAll(".color-swatch").forEach((el, idx) => {
      el.classList.toggle("selected", idx === i);
      el.style.border = idx === i ? `2.5px solid ${COLORS[idx].accent}` : "2.5px solid transparent";
    });
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("form-modal-title").textContent = "Add New App";
    document.getElementById("f-id").value = genId();
    document.getElementById("f-name").value = "";
    document.getElementById("f-desc").value = "";
    document.getElementById("f-url").value = "";
    document.getElementById("f-category").value = CATEGORIES[0];
    document.getElementById("f-requires-auth").checked = false;
    document.getElementById("f-username").value = "";
    document.getElementById("f-password").value = "";
    document.getElementById("cred-fields").style.display = "none";
    document.getElementById("form-save-btn").textContent = "Add App";
    document.getElementById("form-save-btn").disabled = true;
    selectColor(0);
    document.getElementById("form-modal").style.display = "flex";
  }

  function openEditModal(id) {
    editingId = id;
    const app = apps.find(a => a.id === id);
    if (!app) return;
    document.getElementById("form-modal-title").textContent = "Edit App";
    document.getElementById("f-id").value = app.id;
    document.getElementById("f-name").value = app.name;
    document.getElementById("f-desc").value = app.description;
    document.getElementById("f-url").value = app.url || "";
    document.getElementById("f-category").value = app.category;
    document.getElementById("f-requires-auth").checked = app.requiresAuth;
    document.getElementById("f-username").value = app.username || "";
    document.getElementById("f-password").value = app.password || "";
    document.getElementById("cred-fields").style.display = app.requiresAuth ? "" : "none";
    document.getElementById("form-save-btn").textContent = "Save Changes";
    document.getElementById("form-save-btn").disabled = false;
    // Select matching color
    const ci = COLORS.findIndex(c => c.bg === app.color);
    selectColor(ci >= 0 ? ci : 0);
    document.getElementById("form-modal").style.display = "flex";
  }

  function closeFormModal() {
    document.getElementById("form-modal").style.display = "none";
  }

  function toggleCredFields() {
    const checked = document.getElementById("f-requires-auth").checked;
    document.getElementById("cred-fields").style.display = checked ? "" : "none";
  }

  function checkFormValid() {
    const val = document.getElementById("f-name").value.trim();
    document.getElementById("form-save-btn").disabled = !val;
  }

  function saveForm() {
    const name = document.getElementById("f-name").value.trim();
    if (!name) return;
    const appData = {
      id: document.getElementById("f-id").value,
      name,
      description: document.getElementById("f-desc").value.trim(),
      url: document.getElementById("f-url").value.trim(),
      category: document.getElementById("f-category").value,
      requiresAuth: document.getElementById("f-requires-auth").checked,
      username: document.getElementById("f-username").value.trim(),
      password: document.getElementById("f-password").value,
      color: selectedColor.bg,
      accent: selectedColor.accent,
    };
    if (editingId) {
      apps = apps.map(a => a.id === editingId ? appData : a);
    } else {
      apps.push(appData);
    }
    saveApps();
    closeFormModal();
    renderAdmin();
  }

  // ─── Delete Modal ──────────────────────────────────────────────────
  function openDeleteModal(id) {
    deletingId = id;
    const app = apps.find(a => a.id === id);
    document.getElementById("delete-app-name").textContent = app ? app.name : "";
    document.getElementById("delete-modal").style.display = "flex";
  }

  function closeDeleteModal() {
    document.getElementById("delete-modal").style.display = "none";
    deletingId = null;
  }

  function confirmDelete() {
    apps = apps.filter(a => a.id !== deletingId);
    saveApps();
    closeDeleteModal();
    renderAdmin();
  }

  // ─── SVG helpers ───────────────────────────────────────────────────
  function eyeIcon(open) {
    return open
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  function copyIcon() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }

  function esc(str) {
    return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function genId() { return Math.random().toString(36).slice(2, 10); }

  // ─── Init ──────────────────────────────────────────────────────────
  loadApps();
  buildFormSelects();
  showView("public");
</script>
</body>
</html>
